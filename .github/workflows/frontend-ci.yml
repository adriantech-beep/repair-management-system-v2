name: Frontend CI (Vite & Vitest)

on:
  push:
    branches: [ "main" ]
    paths:
      - 'repair-management-app/**'
  pull_request:
    branches: [ "main" ]
    paths:
      - 'repair-management-app/**'
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: repair-management-app

    steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: 'npm'
        cache-dependency-path: repair-management-app/package-lock.json

    - name: Install dependencies
      run: npm ci

    - name: Run linter
      run: npm run lint

    - name: Run unit & integration tests
      run: npm run test

    - name: Verify compilation and production build
      run: npm run build
