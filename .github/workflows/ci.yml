name: Unified Continuous Integration

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "**" ]

jobs:
  backend-validation:
    name: Backend Validation (.NET)
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup .NET SDK
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'
        cache: true
        cache-dependency-path: 'repair-management-api/repair-management-api.csproj'

    - name: Restore dependencies
      run: dotnet restore repair-management-api/repair-management-api.sln

    - name: Compile Solution (Release)
      run: dotnet build repair-management-api/repair-management-api.sln --no-restore --configuration Release

    - name: Run Unit & Integration Tests
      run: dotnet test repair-management-api/repair-management-api.sln --no-build --configuration Release --verbosity normal

  frontend-validation:
    name: Frontend Validation (React & Vite)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: repair-management-app

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: 'npm'
        cache-dependency-path: repair-management-app/package-lock.json

    - name: Install Dependencies
      run: npm ci

    - name: Run Eslint
      run: npm run lint

    - name: Run Vitest Unit Tests
      run: npm run test

    - name: Run Production Compile Check
      run: npm run build

  docker-validation:
    name: Docker Compose Build Verification
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Verify Compose Syntax
      run: docker compose config

    - name: Build Stack Images
      run: docker compose build
